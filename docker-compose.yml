services:
  db:
    image: postgres:17
    container_name: eusopht-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: eusopht
      POSTGRES_PASSWORD: eusopht
      POSTGRES_DB: eusopht
    ports:
      - "5432:5432"
    volumes:
      - eusopht_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eusopht -d eusopht"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  eusopht_pgdata:
